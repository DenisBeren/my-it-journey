<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Список задач</title>
    <style>
        /* стили добавим позже */
    </style>
</head>
<body>
    <h1>Мои задачи</h1>
    <div>
        <input type="text" id="taskInput" placeholder="Что нужно сделать?">
        <button id="addTaskBtn">Добавить</button>
    </div>
    <div>
        <button class="filter-btn" data-filter="all">Все</button>
        <button class="filter-btn" data-filter="active">Активные</button>
        <button class="filter-btn" data-filter="completed">Выполненные</button>
    </div>
    <ul id="taskList"></ul>
    <div id="stats">
        Всего: <span id="totalTasks">0</span> | 
        Выполнено: <span id="completedTasks">0</span> | 
        Осталось: <span id="remainingTasks">0</span>
    </div>
    <script src="todo.js"></script>
</body>
</html>
